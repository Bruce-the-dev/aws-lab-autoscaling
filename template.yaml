AWSTemplateFormatVersion: '2010-09-09'
Description: Auto Scaling Web Tier with ALB - Module 3 Lab 1

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # VPC - Our isolated network in the cloud
  # CIDR 10.0.0.0/16 gives us ~65,000 IP addresses to work with
  # ----------------------------------------------------------
  LabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true        # Allows DNS resolution within VPC
      EnableDnsHostnames: true      # Gives instances DNS names (needed for ALB)
      Tags:
        - Key: Name
          Value: Lab-AutoScaling-VPC

  # ----------------------------------------------------------
  # PUBLIC SUBNETS (2 across different AZs)
  # These will host the ALB and NAT Gateway
  # MapPublicIpOnLaunch=true means anything launched here gets a public IP
  # ----------------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.1.0/24                    # 10.0.1.0 - 10.0.1.255
      AvailabilityZone: !Select [0, !GetAZs ''] # First AZ in the region (eu-west-1a)
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Lab-PublicSubnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.2.0/24                    # 10.0.2.0 - 10.0.2.255
      AvailabilityZone: !Select [1, !GetAZs ''] # Second AZ (eu-west-1b)
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Lab-PublicSubnet-2

  # ----------------------------------------------------------
  # PRIVATE SUBNETS (2 across different AZs)
  # These will host the EC2 instances - no direct internet access
  # ----------------------------------------------------------
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.11.0/24                   # 10.0.11.0 - 10.0.11.255
      AvailabilityZone: !Select [0, !GetAZs ''] # Same AZ as PublicSubnet1
      Tags:
        - Key: Name
          Value: Lab-PrivateSubnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.12.0/24                   # 10.0.12.0 - 10.0.12.255
      AvailabilityZone: !Select [1, !GetAZs ''] # Same AZ as PublicSubnet2
      Tags:
        - Key: Name
          Value: Lab-PrivateSubnet-2

  # ----------------------------------------------------------
  # INTERNET GATEWAY
  # The door to the public internet for our VPC
  # ----------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Lab-IGW

  # Attach the IGW to our VPC (a separate step in CloudFormation)
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LabVPC
      InternetGatewayId: !Ref InternetGateway

  # ----------------------------------------------------------
  # PUBLIC ROUTE TABLE
  # Defines: "anything in here can reach the internet via IGW"
  # ----------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC
      Tags:
        - Key: Name
          Value: Lab-PublicRouteTable

  # The actual route: "0.0.0.0/0 (anywhere) → IGW"
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Associate the public subnets with the public route table
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
# ============================================================
  # SECTION 2 - NAT GATEWAY + PRIVATE ROUTING + SECURITY GROUPS
  # ============================================================

  # ----------------------------------------------------------
  # ELASTIC IP for the NAT Gateway
  # NAT Gateways need a fixed public IP to function
  # ----------------------------------------------------------
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment   # IGW must exist first
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Lab-NatGW-EIP

  # ----------------------------------------------------------
  # NAT GATEWAY
  # Lives in a public subnet, gives private subnets outbound internet
  # We use ONE NAT GW (regional) to save cost — for true HA you'd
  # have one per AZ, but this lab specifies "Regional NAT Gateway"
  # ----------------------------------------------------------
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId  # Attach the EIP
      SubnetId: !Ref PublicSubnet1                       # Lives in public subnet
      Tags:
        - Key: Name
          Value: Lab-NatGateway

  # ----------------------------------------------------------
  # PRIVATE ROUTE TABLE
  # Defines: "private subnets reach internet via NAT GW"
  # ----------------------------------------------------------
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC
      Tags:
        - Key: Name
          Value: Lab-PrivateRouteTable

  # The route: "anywhere (0.0.0.0/0) → NAT Gateway"
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Associate private subnets with the private route table
  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ----------------------------------------------------------
  # SECURITY GROUP - ALB
  # Allows HTTP traffic (port 80) from anywhere on the internet
  # ----------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to the ALB from the internet
      VpcId: !Ref LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0                # Anyone on the internet
          Description: Allow HTTP from anywhere
      Tags:
        - Key: Name
          Value: Lab-ALB-SG

  # ----------------------------------------------------------
  # SECURITY GROUP - EC2 Instances
  # Allows HTTP only from the ALB Security Group (NOT the public internet)
  # No SSH access at all (per lab requirements)
  # ----------------------------------------------------------
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP only from the ALB
      VpcId: !Ref LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup   # KEY: only from ALB SG
          Description: Allow HTTP from ALB only
      Tags:
        - Key: Name
          Value: Lab-EC2-SG
# ============================================================
  # SECTION 3 - ALB + TARGET GROUP + LISTENER
  # ============================================================

  # ----------------------------------------------------------
  # APPLICATION LOAD BALANCER
  # Internet-facing, lives in BOTH public subnets for HA
  # ----------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: Lab-ALB
      Scheme: internet-facing                    # vs 'internal' for private ALBs
      Type: application                          # ALB (vs NLB or GLB)
      IpAddressType: ipv4
      Subnets:                                   # ALB needs at least 2 subnets in different AZs
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup                  # The SG we built in Section 2
      Tags:
        - Key: Name
          Value: Lab-ALB

  # ----------------------------------------------------------
  # TARGET GROUP
  # The pool that EC2 instances will register into
  # ASG will automatically add/remove instances from here
  # ----------------------------------------------------------
  WebServerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: Lab-WebServer-TG
      VpcId: !Ref LabVPC
      Protocol: HTTP                             # How the ALB talks to instances
      Port: 80
      TargetType: instance                       # Targets are EC2 instances (vs IPs, Lambdas)

      # ----- Health Check Configuration -----
      # ALB will ping each instance to check if it's alive
      HealthCheckProtocol: HTTP
      HealthCheckPort: '80'
      HealthCheckPath: /                         # The URL to hit for health checks
      HealthCheckIntervalSeconds: 30             # Check every 30s
      HealthCheckTimeoutSeconds: 5               # Wait max 5s for a response
      HealthyThresholdCount: 2                   # 2 successes = healthy
      UnhealthyThresholdCount: 3                 # 3 failures = unhealthy, remove from rotation
      Matcher:
        HttpCode: '200'                          # Expect HTTP 200 OK as healthy response

      # ----- Deregistration -----
      # When ASG removes an instance, how long to wait before killing connections
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'                            # Quick draining for the lab

      Tags:
        - Key: Name
          Value: Lab-WebServer-TG

  # ----------------------------------------------------------
  # LISTENER
  # Tells the ALB: "listen on port 80, forward to the target group"
  # ----------------------------------------------------------
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward                          # Forward all traffic to the target group
          TargetGroupArn: !Ref WebServerTargetGroup
# ============================================================
  # SECTION 4 - LAUNCH TEMPLATE + ASG + SCALING POLICY
  # ============================================================

  # ----------------------------------------------------------
  # LAUNCH TEMPLATE
  # The blueprint for every EC2 the ASG will launch:
  #   - Amazon Linux 2023 AMI (latest)
  #   - t2.micro (free tier eligible)
  #   - Security group from Section 2
  #   - User data: installs Apache + creates instance-specific page
  # ----------------------------------------------------------
  WebServerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: Lab-WebServer-LaunchTemplate
      LaunchTemplateData:
        # Latest Amazon Linux 2023 AMI for eu-west-1 (Ireland)
        # In a real project, you'd use an SSM parameter to always grab the latest
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t2.micro
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn     # Attach the SSM role for management
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        # NO KeyName property — per lab requirement, no SSH access
        Monitoring:
          Enabled: true                 # Enables detailed CloudWatch metrics
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: Lab-WebServer
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # Update the system and install required packages
            dnf update -y
            dnf install -y httpd stress

            # Start Apache and enable it on boot
            systemctl start httpd
            systemctl enable httpd

            # Get this instance's metadata using IMDSv2 (the secure way)
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/local-ipv4)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)

            # Create an instance-specific HTML page
            cat <<EOF > /var/www/html/index.html
            <!DOCTYPE html>
            <html>
            <head>
              <title>Auto Scaling Lab</title>
              <style>
                body { font-family: Arial; text-align: center; padding: 50px;
                       background: #232f3e; color: white; }
                h1 { color: #ff9900; }
                .info { background: #37475a; padding: 20px; border-radius: 10px;
                        display: inline-block; margin-top: 20px; }
                .label { color: #ff9900; font-weight: bold; }
              </style>
            </head>
            <body>
              <h1>🚀 Auto Scaling Lab - Module 3</h1>
              <div class="info">
                <p><span class="label">Instance ID:</span> $INSTANCE_ID</p>
                <p><span class="label">Private IP:</span> $PRIVATE_IP</p>
                <p><span class="label">Availability Zone:</span> $AZ</p>
              </div>
              <p>Refresh the page to see different instances responding!</p>
            </body>
            </html>
            EOF

            # Endpoint to trigger CPU stress for the scaling demo
            # Hitting /stress will spin all CPUs at 100% for 5 minutes
            cat <<'EOF' > /var/www/html/stress.sh
            #!/bin/bash
            stress --cpu $(nproc) --timeout 300 &
            echo "CPU stress started for 5 minutes"
            EOF
            chmod +x /var/www/html/stress.sh

  # ----------------------------------------------------------
  # AUTO SCALING GROUP
  # - Lives in PRIVATE subnets (security requirement)
  # - Registers instances with our target group
  # - Min 1, Desired 1, Max 4 (per lab requirements)
  # ----------------------------------------------------------
  WebServerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: Lab-WebServer-ASG
      VPCZoneIdentifier:                    # Which subnets to launch into
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref WebServerLaunchTemplate
        Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      DesiredCapacity: '1'
      MaxSize: '4'
      TargetGroupARNs:                      # KEY: auto-register with ALB target group
        - !Ref WebServerTargetGroup
      HealthCheckType: ELB                  # Use ALB health checks (not just EC2 status)
      HealthCheckGracePeriod: 120           # Give instances 2 min to boot before checking
      Tags:
        - Key: Name
          Value: Lab-WebServer-ASG-Instance
          PropagateAtLaunch: true           # Apply this tag to launched instances too

  # ----------------------------------------------------------
  # SCALING POLICY - Target Tracking
  # "Keep average CPU at 30% across the fleet"
  # If CPU goes above 30%, ASG adds instances automatically
  # If CPU drops below, ASG removes instances (scale-in for extra credit!)
  # ----------------------------------------------------------
  CPUScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WebServerAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 30.0                   # Per lab requirements
# ============================================================
  # SSM Access for EC2s (so we can shell in to trigger stress)
  # ============================================================

  # IAM Role that allows EC2s to be managed by SSM
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: Lab-EC2-SSM-Role

  # Instance profile (a wrapper IAM uses to attach roles to EC2s)
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
# ============================================================
# OUTPUTS - Useful values shown after stack creation
# ============================================================
Outputs:
  ALBEndpoint:
    Description: Public URL of the Application Load Balancer
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'

  VPCId:
    Description: ID of the VPC
    Value: !Ref LabVPC

  ASGName:
    Description: Name of the Auto Scaling Group
    Value: !Ref WebServerAutoScalingGroup